name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-and-release-checks:
    name: Python release checks
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and release extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[api,dashboard,dev]" -c requirements/constraints.txt

      - name: Static sanity check
        run: |
          python -m py_compile scripts\validate_readme.py scripts\release_readiness_audit.py scripts\run_monitoring_demo.py scripts\release_integrity_check.py

      - name: README and release integrity checks
        run: |
          python scripts\validate_readme.py
          python scripts\run_monitoring_demo.py
          python scripts\release_integrity_check.py

      - name: Unit tests
        run: python -m pytest tests\unit -q

      - name: Phase 6 final-release smoke test
        run: python -m pytest tests\integration\test_phase6_final_release_smoke.py -q

      - name: Whitespace check
        run: git diff --check
