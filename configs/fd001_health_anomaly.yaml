dataset_dir: data/raw/cmapss
subset: FD001
random_seed: 42
validation_fraction: 0.2
baseline_config_path: configs/fd001_baseline.yaml

include_cycle_as_feature: false
features_to_exclude: []
healthy_rul_threshold: 125
critical_rul_threshold: 30
near_constant_threshold: 1.0e-10
correlation_threshold: 0.95

health_index:
  n_components: 0.95
  lower_quantile: 0.02
  upper_quantile: 0.98
  clip_scaled: true

smoothing:
  method: median
  window: 5
  causal: true

pca_reconstruction:
  n_components: 0.95
  threshold_percentile: 99.0

isolation_forest:
  n_estimators: 100
  max_samples: auto
  contamination: 0.03
  random_state: 42
  n_jobs: -1

one_class_svm:
  kernel: rbf
  nu: 0.04
  gamma: scale
  max_healthy_training_rows: 3000

persistence:
  window: 5
  alarm_state_from_onset: true
  require_consecutive_cycles: true

page_hinkley:
  primary_signal: smoothed_health_index
  direction: decrease
  delta: 0.002
  threshold: 0.18
  min_observations: 20
  reset_after_detection: false

primary_validation_selection_metric: pr_auc
secondary_validation_selection_metrics:
  - f1
  - false_positive_rate
  - detection_rate
  - median_lead_time
  - missed_engines

output_dir: reports/fd001_health_anomaly
results_note_path: notes/fd001_health_anomaly_results.md
representative_engine_count: 4
representative_timeline_split: test

figure_settings:
  scatter_sample_rows: 5000
