dataset_dir: data/raw/cmapss
subset: FD001
random_seed: 42
validation_fraction: 0.2
target_column: rul_capped
rul_cap: 125
include_cycle_as_feature: false
features_to_exclude: []
near_constant_threshold: 1.0e-10
correlation_threshold: 0.95
rolling_features_enabled: false
rolling_window_sizes: [5, 10]
model_selection_metric: rmse
clip_predictions_non_negative: true

ridge:
  alpha: 10.0

random_forest:
  n_estimators: 60
  max_depth: 12
  min_samples_leaf: 3
  random_state: 42
  n_jobs: -1

output_dir: reports/fd001_baseline
results_note_path: notes/fd001_baseline_results.md
plot_sample_engines: 3
sample_sensor_columns:
  - sensor_2
  - sensor_3
  - sensor_4
  - sensor_11
  - sensor_15
