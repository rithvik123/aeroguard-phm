dataset_dir: data/raw/cmapss
training_subsets:
  - FD001
  - FD002
  - FD003
development_test_subsets:
  - FD001
  - FD002
  - FD003
external_subset: FD004
random_seed: 42

include_cycle_as_feature: false
features_to_exclude: []
healthy_rul_threshold: 125
critical_rul_threshold: 30
near_constant_threshold: 1.0e-10
correlation_threshold: 0.95

validation:
  folds: 5
  repeats: 2
  seeds:
    - 5101
    - 5102

candidate_normalization_methods:
  - none
  - global_standardization
  - regime_standardization
  - residualization
operating_regime_counts:
  default: 6
  none: 6
  global_standardization: 6
  regime_standardization: 6
  residualization: 6
residualization:
  ridge_alpha: 1.0

maximum_method_count: 8
method_registry:
  - method_id: no_adjust_median_0975_3of5
    normalization_method: none
    policy:
      policy_id: no_adjust_median_0975_3of5
      calibration_method: empirical_percentile
      fusion_method: median
      threshold: 0.975
      persistence:
        type: k_of_n
        k: 3
        n: 5
      hysteresis:
        enter_threshold: 0.95
        exit_threshold: 0.85
        min_enter_duration: 3
        min_clear_duration: 3
      operational_profile: balanced
  - method_id: global_median_0975_3of5
    normalization_method: global_standardization
    policy:
      policy_id: global_median_0975_3of5
      calibration_method: empirical_percentile
      fusion_method: median
      threshold: 0.975
      persistence:
        type: k_of_n
        k: 3
        n: 5
      hysteresis:
        enter_threshold: 0.95
        exit_threshold: 0.85
        min_enter_duration: 3
        min_clear_duration: 3
      operational_profile: balanced
  - method_id: regime_median_0975_3of5
    normalization_method: regime_standardization
    policy:
      policy_id: regime_median_0975_3of5
      calibration_method: empirical_percentile
      fusion_method: median
      threshold: 0.975
      persistence:
        type: k_of_n
        k: 3
        n: 5
      hysteresis:
        enter_threshold: 0.95
        exit_threshold: 0.85
        min_enter_duration: 3
        min_clear_duration: 3
      operational_profile: balanced
  - method_id: residual_median_0975_3of5
    normalization_method: residualization
    policy:
      policy_id: residual_median_0975_3of5
      calibration_method: empirical_percentile
      fusion_method: median
      threshold: 0.975
      persistence:
        type: k_of_n
        k: 3
        n: 5
      hysteresis:
        enter_threshold: 0.95
        exit_threshold: 0.85
        min_enter_duration: 3
        min_clear_duration: 3
      operational_profile: balanced
  - method_id: regime_weighted_095_c3
    normalization_method: regime_standardization
    policy:
      policy_id: regime_weighted_095_c3
      calibration_method: empirical_percentile
      fusion_method: weighted_mean
      weights:
        pca_reconstruction: 0.20
        isolation_forest: 0.40
        one_class_svm: 0.40
      threshold: 0.95
      persistence:
        type: consecutive
        k: 3
      hysteresis:
        enter_threshold: 0.93
        exit_threshold: 0.80
        min_enter_duration: 3
        min_clear_duration: 3
      operational_profile: balanced
  - method_id: global_voting_095_2of5
    normalization_method: global_standardization
    policy:
      policy_id: global_voting_095_2of5
      calibration_method: empirical_percentile
      fusion_method: voting
      voting_rule: at_least_two
      threshold: 0.95
      persistence:
        type: k_of_n
        k: 2
        n: 5
      hysteresis:
        enter_threshold: 0.92
        exit_threshold: 0.78
        min_enter_duration: 3
        min_clear_duration: 3
      operational_profile: balanced

utility_weights:
  detection_rate: 2.0
  critical_region_recall: 1.3
  detected_before_30_fraction: 0.4
  detected_before_60_fraction: 0.3
  false_alarm_engine_rate: 1.5
  max_domain_false_alarm_engine_rate: 0.8
  missed_engine_rate: 1.0
  healthy_region_false_positive_rate: 1.2
  fold_variability: 0.3
  domain_variability: 0.5
  alert_instability: 0.02
feasibility_constraints:
  max_mean_false_alarm_engine_rate: 0.45
  max_mean_healthy_region_false_positive_rate: 0.45
  minimum_mean_detection_rate: 0.20
  minimum_mean_critical_region_recall: 0.20

detectors:
  pca_reconstruction:
    n_components: 0.95
    threshold_percentile: 99.0
  isolation_forest:
    n_estimators: 50
    max_samples: auto
    contamination: 0.03
    random_state: 42
    n_jobs: -1
  one_class_svm:
    kernel: rbf
    nu: 0.04
    gamma: scale
    max_healthy_training_rows: 1500

health_index:
  n_components: 0.95
  lower_quantile: 0.02
  upper_quantile: 0.98
  clip_scaled: true

smoothing:
  method: median
  window: 5
  causal: true

score_calibration:
  method: empirical_percentile
  lower_quantile: 0.01
  upper_quantile: 0.99
  epsilon: 1.0e-9
  clip: true

operational_alert_thresholds:
  monitor_score: 0.60
  warning_score: 0.80
  critical_score: 0.95
  warning_health_index_max: 0.55
  critical_health_index_max: 0.35

rul_baseline:
  ridge_alpha: 1.0
  random_forest:
    n_estimators: 60
    max_depth: 12
    min_samples_leaf: 2
    n_jobs: -1

bootstrap_samples: 1000
confidence_level: 0.95
bootstrap_seed: 9101

generalization_criteria:
  strong:
    fd004_detection_rate: 0.70
    fd004_false_alarm_engine_rate: 0.20
    fd004_missed_engine_rate: 0.30
    fd004_critical_region_recall: 0.70
    fd004_rul_mae: 25.0
  moderate:
    fd004_detection_rate: 0.50
    fd004_false_alarm_engine_rate: 0.35
    fd004_missed_engine_rate: 0.50
    fd004_critical_region_recall: 0.50
    fd004_rul_mae: 35.0
  weak:
    fd004_detection_rate: 0.30
    fd004_false_alarm_engine_rate: 0.60
    fd004_missed_engine_rate: 0.70
    fd004_critical_region_recall: 0.30
    fd004_rul_mae: 50.0

output_dir: reports/multidomain_phm
representative_timeline_count: 2
plotting:
  scatter_sample_rows: 5000
